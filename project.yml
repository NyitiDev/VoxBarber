name: VoxBarber
options:
  bundleIdPrefix: com.voxbarber
  deploymentTarget:
    macOS: "13.0"
  defaultConfig: Debug

settings:
  base:
    PRODUCT_NAME: VoxBarber
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic

targets:
  VoxBarber:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Resources
    resources:
      - path: Resources/voxbarber_logo.png
    info:
      path: Sources/Info.plist
      properties:
        CFBundleName: VoxBarber
        CFBundleShortVersionString: "0.1"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "13.0"
        NSPrincipalClass: NSApplication
        NSMainNibFile: ""
        CFBundleDocumentTypes:
          - CFBundleTypeName: Audio File
            CFBundleTypeRole: Editor
            LSHandlerRank: Alternate
            CFBundleTypeExtensions:
              - mp3
              - wav
              - aiff
              - aif
              - m4a
              - caf

    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
